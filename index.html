<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status do Projeto Bling → BigQuery</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a31;
      --text: #e9eefc;
      --muted: #a6b2d9;
      --line: rgba(255,255,255,.08);
      --ok: #2ecc71;
      --info: #4da3ff;
      --danger: #ff6b6b;
      --shadow: 0 14px 40px rgba(0,0,0,.28);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(77,163,255,.16), transparent 24%),
        radial-gradient(circle at top right, rgba(46,204,113,.12), transparent 22%),
        linear-gradient(180deg, #09101d, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== Login Screen ===== */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 40px;
      width: min(420px, 100%);
      text-align: center;
    }

    .login-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .login-card h1 {
      font-size: 24px;
      margin: 0 0 8px;
    }

    .login-card p {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 24px;
      line-height: 1.5;
    }

    .login-field {
      position: relative;
      margin-bottom: 16px;
    }

    .login-field input {
      width: 100%;
      padding: 14px 18px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
      transition: border-color .2s;
    }

    .login-field input:focus {
      border-color: var(--info);
    }

    .login-field input::placeholder {
      color: var(--muted);
      opacity: .6;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      color: var(--text);
      background: linear-gradient(180deg, rgba(77,163,255,.25), rgba(77,163,255,.12));
      border: 1px solid rgba(77,163,255,.3);
      border-radius: 12px;
      cursor: pointer;
      transition: opacity .2s;
    }

    .login-btn:hover { opacity: .85; }
    .login-btn:disabled { opacity: .4; cursor: wait; }

    .login-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
    }

    .login-footer {
      color: var(--muted);
      font-size: 12px;
      margin-top: 20px;
      opacity: .6;
    }

    /* ===== Decrypted Content Container ===== */
    #decrypted-content {
      display: none;
    }
  </style>
</head>
<body>

      <div class="login-field">
        <input type="password" id="pwd-input" placeholder="Senha de acesso" autocomplete="off" />

      <div class="login-error" id="pwd-error"></div>
      <div class="login-footer">Conteúdo protegido por criptografia AES-256</div>
    </div>
  </div>

  <script>
    // Allow Enter key to submit
    document.getElementById('pwd-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') decrypt();
    });
    document.getElementById('pwd-input').focus();

    async function decrypt() {
      var pwdInput = document.getElementById('pwd-input');
      var errorEl = document.getElementById('pwd-error');
      var btn = document.getElementById('pwd-btn');
      var password = pwdInput.value;

      if (!password) {
        errorEl.textContent = 'Digite a senha.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Descriptografando...';
      errorEl.textContent = '';

      try {
        var payload = JSON.parse(document.getElementById('encrypted-payload').textContent);
        var salt = Uint8Array.from(atob(payload.salt), function(c) { return c.charCodeAt(0); });
        var iv = Uint8Array.from(atob(payload.iv), function(c) { return c.charCodeAt(0); });
        var ct = Uint8Array.from(atob(payload.ct), function(c) { return c.charCodeAt(0); });

        // Derive key with PBKDF2
        var enc = new TextEncoder();
        var keyMaterial = await crypto.subtle.importKey(
          'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
        );
        var key = await crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
          keyMaterial,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );

        // Decrypt
        var decrypted = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: iv },
          key,
          ct
        );

        var html = new TextDecoder().decode(decrypted);

        // Hide login, show content
        document.getElementById('login-screen').style.display = 'none';
        var container = document.getElementById('decrypted-content');
        container.innerHTML = html;
        container.style.display = 'block';

        // Execute any <script> tags in decrypted content
        var scripts = container.querySelectorAll('script');
        scripts.forEach(function(oldScript) {
          var newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          oldScript.parentNode.replaceChild(newScript, oldScript);
        });

      } catch (e) {
        errorEl.textContent = 'Senha incorreta.';
        btn.disabled = false;
        btn.textContent = 'Acessar';
        pwdInput.value = '';
        pwdInput.focus();
      }
    }
  </script>
